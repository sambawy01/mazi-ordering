name: foodics_ordering
description: Foodics POS ordering app for waiters and customers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  # Networking
  dio: ^5.4.0
  # State management
  flutter_riverpod: ^2.4.0
  # QR scanner
  mobile_scanner: ^5.1.0
  # WebSocket
  web_socket_channel: ^2.4.0
  # Storage
  shared_preferences: ^2.2.0
  # UI
  google_fonts: ^6.2.0
  cached_network_image: ^3.3.0
  flutter_animate: ^4.5.0
  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/